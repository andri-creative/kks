version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: kks_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: user123
      MYSQL_DATABASE: kks
      MYSQL_USER: user
      MYSQL_PASSWORD: user123
    ports:
      - "3307:3306"
    volumes:
      - kks_db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: kks_backend
    restart: always
    ports:
      - "37900:37900"
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=database
      - DB_PORT=3306
    depends_on:
      - database

  frontend:
    build: ./frontend
    container_name: kks_frontend
    restart: always
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    # Mengizinkan hot-reload bekerja jika environment lokal di-mount
    volumes:
      - ./frontend/src:/app/src

volumes:
  kks_db_data:
